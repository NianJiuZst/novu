name: EE Sync Next

# This workflow synchronizes the enterprise submodule to the "next" branch
# when the "ee sync next" label is added to a PR
# Logic:
# 1. Triggers when "ee sync next" label is added to a PR
# 2. Checks out the PR branch with submodules
# 3. Updates the .source submodule to point to the "next" branch
# 4. Commits and pushes the submodule hash change

on:
  pull_request:
    types: [labeled]

jobs:
  check_submodule_token:
    name: Check if submodule token exists
    runs-on: ubuntu-latest
    if: github.event.label.name == 'ee sync next'
    outputs:
      has_token: ${{ steps.secret-check.outputs.has_token }}
    steps:
      - name: Debug label info
        run: |
          echo "Label name: ${{ github.event.label.name }}"
          echo "Event action: ${{ github.event.action }}"
          echo "PR number: ${{ github.event.pull_request.number }}"

      - name: Check if secret exists
        id: secret-check
        run: |
          if [[ -n "${{ secrets.SUBMODULES_TOKEN }}" ]]; then
            echo "has_token=true" >> $GITHUB_OUTPUT
          else
            echo "has_token=false" >> $GITHUB_OUTPUT
          fi

  sync-ee-next:
    runs-on: ubuntu-latest
    needs: [check_submodule_token]
    if: needs.check_submodule_token.outputs.has_token == 'true'

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SUBMODULES_TOKEN }}
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          fetch-depth: 0
          submodules: true

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update submodule to next branch
        run: |
          # Make the script executable
          chmod +x .github/workflows/scripts/sync-ee-next.sh

          # Run the sync script with auto-push enabled and PR URL
          ./.github/workflows/scripts/sync-ee-next.sh "next" "true" "${{ github.event.pull_request.html_url }}"

      - name: Add comment to PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: commits } = await github.rest.repos.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: '${{ github.event.pull_request.head.ref }}',
              per_page: 1
            });

            const latestCommit = commits[0];
            const commitUrl = latestCommit.html_url;
            const shortSha = latestCommit.sha.substring(0, 7);

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🔄 **Enterprise Submodule Sync Complete**
              
              The \`.source\` submodule has been successfully updated to point to the \`next\` branch.
              
              📝 **Changes:**
              - Updated enterprise submodule reference
              - Commit: [${shortSha}](${commitUrl})
              
              ✅ The PR branch now includes the latest enterprise code from the \`next\` branch.`
            });

  sync-failed:
    runs-on: ubuntu-latest
    needs: [check_submodule_token, sync-ee-next]
    if: failure() && needs.check_submodule_token.outputs.has_token == 'true'

    steps:
      - name: Add failure comment to PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `❌ **Enterprise Submodule Sync Failed**
              
              The attempt to sync the \`.source\` submodule to the \`next\` branch has failed.
              
              Please check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.
              
              You may need to manually sync the submodule or check for conflicts.`
            });

  no-token:
    runs-on: ubuntu-latest
    needs: [check_submodule_token]
    if: needs.check_submodule_token.outputs.has_token == 'false'

    steps:
      - name: Add no-token comment to PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `⚠️ **Enterprise Submodule Sync Skipped**
              
              The \`SUBMODULES_TOKEN\` secret is not configured, so the enterprise submodule sync cannot be performed.
              
              Please contact a repository administrator to configure the required token.`
            });

  cleanup:
    runs-on: ubuntu-latest
    needs: [check_submodule_token, sync-ee-next, sync-failed, no-token]
    if: always() && github.event.label.name == 'ee sync next'

    steps:
      - name: Remove label
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.removeLabel({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'ee sync next'
            });
